suite: Test xgboost-distributed ClusterTrainingRuntime
templates:
  - templates/runtimes/xgboost-distributed.yaml
release:
  name: kubeflow-trainer
  namespace: kubeflow-trainer
tests:
  - it: Should not render ClusterTrainingRuntime when runtimes.xgboostDistributed.enabled is false
    set:
      runtimes:
        xgboostDistributed:
          enabled: false
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render ClusterTrainingRuntime when runtimes.xgboostDistributed.enabled is true
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: ""
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterTrainingRuntime
      - equal:
          path: metadata.name
          value: xgboost-distributed

  - it: Should have correct framework label
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: ""
    asserts:
      - equal:
          path: metadata.labels["trainer.kubeflow.org/framework"]
          value: xgboost

  - it: Should have correct XGBoost mlPolicy configuration
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: ""
    asserts:
      - equal:
          path: spec.mlPolicy.numNodes
          value: 1
      - equal:
          path: spec.mlPolicy.xgboost
          value: {}

  - it: Should use custom image tag when specified
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: "v1.0.0"
    asserts:
      - equal:
          path: spec.template.spec.replicatedJobs[0].template.spec.template.spec.containers[0].image
          value: ghcr.io/kubeflow/trainer/xgboost-runtime:v1.0.0

  - it: Should have node replicatedJob
    set:
      runtimes:
        xgboostDistributed:
          enabled: true
          image:
            registry: ghcr.io
            repository: kubeflow/trainer/xgboost-runtime
            tag: ""
    asserts:
      - equal:
          path: spec.template.spec.replicatedJobs[0].name
          value: node
